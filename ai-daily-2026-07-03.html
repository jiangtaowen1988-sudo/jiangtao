      {title:"claude-real-video：让任何大语言模型都能观看视频",source:"GitHub",summary:"开源工具基于视频画面理解内容，场景变化检测+关键帧提取+转录音频，全部本地处理。",url:"https://github.com/HUANGCHIHHUNGLeo/claude-real-video",isNew:true},
      {title:"Claude Fable 5 自主优化 AIHOT 网站 SEO/GEO 全记录",source:"数字生命卡兹克",summary:"Fable 5自主启动22个Agent优化AIHOT网站，从调研到运维文档全程自主完成。",url:"https://mp.weixin.qq.com/s/L6R_SPWlOBv6dI0wWWHQrg",isNew:true}
    ]}
  ];

  // ── Helpers ──
  function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  // ── Build ──
  var globalIdx = 0;
  var sectionCounts = [];

  sections.forEach(function(sec) {
    sec.cards = sec.items.map(function(item) {
      globalIdx++;
      return {num:globalIdx, title:item.title, source:item.source, summary:item.summary, url:item.url, isNew:item.isNew};
    });
    sectionCounts.push(sec.cards.length);
    sec.color = SECTION_COLORS[sections.indexOf(sec)];
  });

  var total = globalIdx;
  var genDate = new Date('2026-07-03T23:50:00+08:00');
  var nowBJ = new Date();

  function fmtFull(d) {
    return d.toLocaleString('zh-CN',{year:'numeric',month:'long',day:'numeric',hour:'2-digit',minute:'2-digit',timeZone:'Asia/Shanghai',hour12:false});
  }

  document.getElementById('heroDate').textContent = fmtFull(genDate) + ' · 北京时间（已更新）';

  // Hero stats
  var newTotal = 0;
  sections.forEach(function(sec) { sec.cards.forEach(function(c) { if (c.isNew) newTotal++; }); });
  var statsHTML = '<div class="stat-item"><div class="stat-num">' + total + '</div><div class="stat-label">总条目</div></div>';
  statsHTML += '<div class="stat-item"><div class="stat-num" style="background:linear-gradient(135deg,#fbbf24,#f59e0b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">' + newTotal + '</div><div class="stat-label">🆕 新增</div></div>';
  SECTION_LABELS.forEach(function(l,i) {
    statsHTML += '<div class="stat-item"><div class="stat-num">' + sectionCounts[i] + '</div><div class="stat-label">' + l + '</div></div>';
  });
  document.getElementById('heroStats').innerHTML = statsHTML;

  var tagsHTML = SECTION_LABELS.map(function(l,i) {
    return '<span class="hero-section-tag">' + l + '（' + sectionCounts[i] + '）</span>';
  }).join('');
  document.getElementById('heroTags').innerHTML = tagsHTML;

  // Nav
  var navHTML = SECTION_LABELS.map(function(l,i) {
    return '<a href="#sec-' + SECTION_SLUGS[i] + '">' + SECTION_ICONS[i] + ' ' + l + '<span class="nav-count">' + sectionCounts[i] + '</span></a>';
  }).join('');
  document.getElementById('navLinks').innerHTML = navHTML;

  // Sections
  var mainHTML = '';
  sections.forEach(function(sec, si) {
    mainHTML += '<section class="section" id="sec-' + SECTION_SLUGS[si] + '">';
    mainHTML += '<div class="section-header">';
    mainHTML += '<div class="section-icon" style="background:' + SECTION_COLORS[si] + '1a;color:' + SECTION_COLORS[si] + '">' + SECTION_ICONS[si] + '</div>';
    mainHTML += '<h2 class="section-title">' + SECTION_LABELS[si] + '</h2>';
    mainHTML += '<span class="section-count">' + sec.cards.length + ' 条</span>';
    mainHTML += '</div>';

    if (sec.cards.length === 0) {
      mainHTML += '<div class="empty-section"><div class="empty-icon">📭</div><div class="empty-text">今日暂无内容</div></div>';
    } else {
      mainHTML += '<div class="cards">';
      sec.cards.forEach(function(c) {
        var newClass = c.isNew ? ' card-new' : '';
        mainHTML += '<article class="card' + newClass + '">';
        mainHTML += '<span class="card-num">' + c.num + '</span>';
        mainHTML += '<div class="card-header">';
        mainHTML += '<h3 class="card-title">' + esc(c.title) + '</h3>';
        mainHTML += '<span class="card-source" style="background:' + SECTION_COLORS[si] + '12;color:' + SECTION_COLORS[si] + '">' + esc(c.source) + '</span>';
        mainHTML += '</div>';
        mainHTML += '<p class="card-summary">' + esc(c.summary) + '</p>';
        mainHTML += '<div class="card-footer">';
        mainHTML += '<a class="card-link" href="' + esc(c.url) + '" target="_blank" rel="noopener noreferrer">';
        mainHTML += '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>';
        mainHTML += '阅读原文</a>';
        mainHTML += '</div>';
        mainHTML += '</article>';
      });
      mainHTML += '</div>';
    }
    mainHTML += '</section>';
  });
  document.getElementById('mainContent').innerHTML = mainHTML;

  // Footer
  document.getElementById('footerText').innerHTML =
    '共收录 <strong>' + total + '</strong> 条 AI 动态（其中 <strong style="color:#f59e0b">' + newTotal + '</strong> 条为今日白天新增精选），覆盖 ' + SECTION_LABELS.join('、') + ' 五大版块。<br>' +
    '数据来源：<a href="https://aihot.virxact.com" target="_blank" rel="noopener noreferrer">AI HOT (aihot.virxact.com)</a> · ' +
    '更新于 ' + fmtFull(genDate) + '（北京时间）';

  // Nav scroll highlight
  var navAnchors = document.querySelectorAll('.nav a');
  var observer = new IntersectionObserver(function(entries) {
    entries.forEach(function(e) {
      if (e.isIntersecting) {
        navAnchors.forEach(function(a) { a.classList.remove('active'); });
        var target = document.querySelector('.nav a[href="#' + e.target.id + '"]');
        if (target) target.classList.add('active');
      }
    });
  }, { rootMargin: '-80px 0px -50% 0px' });
  document.querySelectorAll('.section').forEach(function(s) { observer.observe(s); });
})();
</script>
</body>
</html>
