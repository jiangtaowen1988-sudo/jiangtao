.hero-section-tags {

    mainHTML += '</div>';

    if (sec.cards.length === 0) {
      mainHTML += '<div class="empty-section"><div class="empty-icon">📭</div><div class="empty-text">今日暂无内容</div></div>';
    } else {
      mainHTML += '<div class="cards">';
      sec.cards.forEach(function(c) {
        mainHTML += '<article class="card">';
        mainHTML += '<span class="card-num">' + c.num + '</span>';
        mainHTML += '<div class="card-header">';
        mainHTML += '<h3 class="card-title">' + esc(c.title) + '</h3>';
        mainHTML += '<span class="card-source" style="background:' + SECTION_COLORS[c.sectionIdx] + '12;color:' + SECTION_COLORS[c.sectionIdx] + '">' + esc(c.source) + '</span>';
        mainHTML += '</div>';
        mainHTML += '<p class="card-summary">' + esc(c.summary) + '</p>';
        mainHTML += '<div class="card-footer">';
        mainHTML += '<a class="card-link" href="' + esc(c.url) + '" target="_blank" rel="noopener noreferrer">';
        mainHTML += '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>';
        mainHTML += '阅读原文</a>';
        mainHTML += '</div>';
        mainHTML += '</article>';
      });
      mainHTML += '</div>';
    }
    mainHTML += '</section>';
  });
  document.getElementById('mainContent').innerHTML = mainHTML;

  // ── Footer ──
  document.getElementById('footerText').innerHTML =
    '共收录 <strong>' + total + '</strong> 条 AI 动态，覆盖 ' + SECTION_LABELS.join('、') + ' 五大版块。<br>' +
    '数据来源：<a href="https://aihot.virxact.com" target="_blank" rel="noopener noreferrer">AI HOT (aihot.virxact.com)</a> · ' +
    '生成时间：' + fmtFull(genDate) + '（北京时间）';

  // ── Nav scroll highlight ──
  var navAnchors = document.querySelectorAll('.nav a');
  var observer = new IntersectionObserver(function(entries) {
    entries.forEach(function(e) {
      if (e.isIntersecting) {
        navAnchors.forEach(function(a) { a.classList.remove('active'); });
        var target = document.querySelector('.nav a[href="#' + e.target.id + '"]');
        if (target) target.classList.add('active');
      }
    });
  }, { rootMargin: '-80px 0px -50% 0px' });
  document.querySelectorAll('.section').forEach(function(s) { observer.observe(s); });

  function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
})();
</script>

</body>
</html>
